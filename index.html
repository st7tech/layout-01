<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical help online</title>

    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/normalize.css">
    <link rel="stylesheet" href="./style/main.css">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <div class="header__logo">
                <img src="./img/logo.svg" alt="logo" class="header__logo-img">
            </div>
            <nav class="header__nav">
                <ul class="header__list">
                    <li class="header__item"><a href="#" class="header__link header__link-active">Home</a></li>
                    <li class="header__item"><a href="#" class="header__link">Find a doctor</a></li>
                    <li class="header__item"><a href="#" class="header__link">Apps</a></li>
                    <li class="header__item"><a href="#" class="header__link">Testimonials</a></li>
                    <li class="header__item"><a href="#" class="header__link">About us</a></li>
                </ul>
            </nav>  
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero__container">
                <div class="hero__content">
                    <h1 class="hero__header">Virtual healthcare for you</h1>
                    <p class="hero__description">Trafalgar provides progressive, and affordable healthcare, accessible on mobile and online for everyone</p>
                    <button class="hero__record-btn">Consult today</button>
                </div>
                <div class="hero__block-image">
                    <img src="./img/illustration.png" alt="#" class="hero__image">
                </div>  
            </div>
        </section>
    </main>
</body>
</html>
